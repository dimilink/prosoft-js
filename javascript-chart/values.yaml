# Общие настройки
replicaCount: 1
imagePullPolicy: IfNotPresent

# Настройки образов (обычно задаются реальные registry)
frontend:
  repository: localhost/frontend
  tag: latest
  port: 8080
  # Опциональный NodePort для доступа из локальной сети
  nodePort:
    enabled: false
    port: 30081
  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
  readinessProbe:
      enabled: true
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10

backend:
  repository: localhost/backend
  tag: latest
  port: 8080
  cookieSecret: ""  # Задайте через --set или secret, в values секреты не хранят
  nodePort:
    enabled: false
    port: 30082
  livenessProbe:
    enabled: true
    path: /api
    initialDelaySeconds: 20
    periodSeconds: 20
    failureThreshold: 3
  readinessProbe:
      enabled: true
      path: /api
      initialDelaySeconds: 5
      periodSeconds: 10

nginx:
  repository: nginx
  tag: "1.29.4"
  port: 8080
  # Обычно доступ реализуется через Ingress/LoadBalancer,
  # но можно включить NodePort для отладки в dev-окружении при необходимости
  nodePort:
    enabled: false
    port: 30080
  livenessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 20
    failureThreshold: 3
  readinessProbe:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10

# Ресурсы контейнеров
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi