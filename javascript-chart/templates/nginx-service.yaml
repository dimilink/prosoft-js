apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-nginx
spec:
  type: {{ if .Values.nginx.nodePort.enabled }}NodePort{{ else }}ClusterIP{{ end }}
  selector:
    app: {{ .Release.Name }}-nginx
  ports:
      - name: http
        port: {{ .Values.nginx.port }}
        targetPort: http
    {{- if .Values.nginx.nodePort.enabled }}
        nodePort: {{ .Values.nginx.nodePort.port }}
    {{- end }}