name: test-assignment
services:
  nginx:
    container_name: nginx
    image: nginx:1.29.4
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - ${PORT:-8080}:8080

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      target: development
    volumes:
      - ./frontend:/src

  backend:
    container_name: backend
    build:
      context: ./backend
      target: development
    environment:
      - COOKIE_SECRET=${COOKIE_SECRET}
    volumes:
      - ./backend:/src

